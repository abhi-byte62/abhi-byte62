<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg">

<defs>

<linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">

<stop offset="0%" stop-color="#050816"></stop>

<stop offset="100%" stop-color="#0f172a"></stop>

</linearGradient>

<linearGradient id="blue">

<stop offset="0%" stop-color="#2563EB"></stop>

<stop offset="100%" stop-color="#60A5FA"></stop>

</linearGradient>

<filter id="glow">

<feGaussianBlur stdDeviation="4" result="coloredBlur"></feGaussianBlur>

<feMerge>

<feMergeNode in="coloredBlur"></feMergeNode>

<feMergeNode in="SourceGraphic"></feMergeNode>

</feMerge>

</filter>

</defs>

<!-- Background -->

<rect width="1200" height="320" fill="url(#bg)"></rect>

<!-- Outer Ring -->

<circle cx="930" cy="160" r="105" fill="none" stroke="#2563EB" stroke-width="2" opacity=".25">

<animate attributeName="r" values="105;120;105" dur="5s" repeatCount="indefinite"></animate>

</circle>

<!-- Middle Ring -->

<circle cx="930" cy="160" r="75" fill="none" stroke="#3B82F6" stroke-width="2" opacity=".6">

<animate attributeName="r" values="75;90;75" dur="4s" repeatCount="indefinite"></animate>

</circle>

<!-- Inner Ring -->

<circle cx="930" cy="160" r="42" fill="none" stroke="#60A5FA" stroke-width="2">

<animate attributeName="r" values="42;55;42" dur="3s" repeatCount="indefinite"></animate>

</circle>

<!-- Logo -->

<text x="885" y="177" font-size="60" font-family="Consolas" fill="url(#blue)" filter="url(#glow)">

&lt;/&gt;

</text>

<!-- Name -->

<text x="70" y="95" font-size="54" font-family="Segoe UI" font-weight="700" fill="white">

Abhishek M R

</text>

<!-- Role -->

<text x="70" y="140" font-size="26" font-family="Segoe UI" fill="#60A5FA">

FULL STACK DEVELOPER

</text>

<!-- Description -->

<text x="70" y="185" font-size="20" font-family="Segoe UI" fill="#CBD5E1">

Building secure, scalable software

</text>

<text x="70" y="215" font-size="20" font-family="Segoe UI" fill="#CBD5E1">

using Java, React &amp; Spring Boot.

</text>

<!-- Tech Pills -->

<rect x="70" y="250" rx="18" ry="18" width="80" height="34" fill="#111827" stroke="#2563EB"></rect>

<text x="92" y="272" font-size="15" font-family="Segoe UI" fill="white">

Java

</text>

<rect x="165" y="250" rx="18" ry="18" width="85" height="34" fill="#111827" stroke="#2563EB"></rect>

<text x="188" y="272" font-size="15" font-family="Segoe UI" fill="white">

React

</text>

<rect x="265" y="250" rx="18" ry="18" width="120" height="34" fill="#111827" stroke="#2563EB"></rect>

<text x="287" y="272" font-size="15" font-family="Segoe UI" fill="white">

Spring Boot

</text>

</svg>
