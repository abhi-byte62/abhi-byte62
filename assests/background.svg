
<svg width="1200"
     height="700"
     viewBox="0 0 1200 700"
     xmlns="http://www.w3.org/2000/svg">

<defs>

<linearGradient id="bg"
x1="0%"
y1="0%"
x2="100%"
y2="100%">

<stop offset="0%" stop-color="#050816"/>

<stop offset="100%" stop-color="#0F172A"/>

</linearGradient>

<radialGradient id="glow">

<stop offset="0%" stop-color="#3B82F6" stop-opacity=".45"/>

<stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>

</radialGradient>

</defs>

<!-- Background -->

<rect
width="1200"
height="700"
fill="url(#bg)"/>

<!-- Left Glow -->

<circle
cx="240"
cy="170"
r="220"
fill="url(#glow)">

<animate
attributeName="r"
values="220;250;220"
dur="6s"
repeatCount="indefinite"/>

</circle>

<!-- Right Glow -->

<circle
cx="970"
cy="540"
r="200"
fill="url(#glow)">

<animate
attributeName="r"
values="200;235;200"
dur="7s"
repeatCount="indefinite"/>

</circle>

<!-- Grid -->

<g
stroke="#1E3A8A"
stroke-opacity=".18">




     </g>

<!-- Floating Dots -->

<g fill="#60A5FA">

<circle cx="140" cy="100" r="3">
<animate attributeName="cy"
values="100;80;100"
dur="5s"
repeatCount="indefinite"/>
</circle>

<circle cx="380" cy="430" r="3">
<animate attributeName="cy"
values="430;410;430"
dur="6s"
repeatCount="indefinite"/>
</circle>

<circle cx="620" cy="240" r="2">
<animate attributeName="cy"
values="240;220;240"
dur="4s"
repeatCount="indefinite"/>
</circle>

<circle cx="870" cy="130" r="3">
<animate attributeName="cy"
values="130;110;130"
dur="5s"
repeatCount="indefinite"/>
</circle>

<circle cx="1060" cy="560" r="3">
<animate attributeName="cy"
values="560;540;560"
dur="7s"
repeatCount="indefinite"/>
</circle>

</g>

<!-- Decorative Lines -->

<path
d="M0 650 C250 580 400 700 650 640 S1000 590 1200 650"
stroke="#2563EB"
stroke-opacity=".3"
stroke-width="2"
fill="none"/>

<path
d="M0 620 C250 550 400 670 650 610 S1000 560 1200 620"
stroke="#3B82F6"
stroke-opacity=".15"
stroke-width="1"
fill="none"/>

</svg>  





