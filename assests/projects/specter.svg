font-family="Segoe UI">

HTTPS

</text>

<!-- Divider -->

<line
x1="35"
y1="178"
x2="525"
y2="178"
stroke="#334155"/>

<!-- Footer -->

<text
x="35"
y="200"
font-size="15"
fill="#60A5FA"
font-family="Segoe UI">

View Repository →

</text>

</svg>
