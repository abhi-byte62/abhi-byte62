<svg xmlns="http://www.w3.org/2000/svg"
     width="560"
     height="220"
     viewBox="0 0 560 220">

<defs>

<linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#111827"/>
    <stop offset="100%" stop-color="#1E293B"/>
</linearGradient>

<linearGradient id="blue">
    <stop offset="0%" stop-color="#2563EB"/>
    <stop offset="100%" stop-color="#60A5FA"/>
</linearGradient>

<filter id="glow">
    <feGaussianBlur stdDeviation="5" result="blur"/>
    <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
    </feMerge>
</filter>

</defs>

<!-- Card -->

<rect
x="5"
y="5"
width="550"
height="210"
rx="22"
fill="url(#card)"
stroke="#2563EB"
stroke-width="2"/>

<!-- Glow -->

<circle
cx="480"
cy="60"
r="18"
fill="#3B82F6"
opacity=".45"
filter="url(#glow)">

<animate
attributeName="r"
values="18;26;18"
dur="3s"
repeatCount="indefinite"/>

</circle>

<!-- Globe -->

<text
x="35"
y="55"
font-size="30">

🌐

</text>

<!-- Title -->

<text
x="80"
y="55"
font-size="24"
font-family="Segoe UI"
font-weight="700"
fill="white">

Developer Portfolio

</text>

<!-- Subtitle -->

<text
x="35"
y="95"
font-size="18"
font-family="Segoe UI"
fill="#CBD5E1">

Premium Portfolio built with modern web technologies

</text>

