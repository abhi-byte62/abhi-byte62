
<svg xmlns="http://www.w3.org/2000/svg"
     width="1200"
     height="520"
     viewBox="0 0 1200 520">

<defs>

<linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#111827"/>
    <stop offset="100%" stop-color="#1E293B"/>
</linearGradient>

<linearGradient id="bar" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#2563EB"/>
    <stop offset="100%" stop-color="#60A5FA"/>
</linearGradient>

<filter id="glow">
    <feGaussianBlur stdDeviation="4" result="blur"/>
    <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
    </feMerge>
</filter>

</defs>

<!-- Card -->

<rect
x="20"
y="20"
width="1160"
height="480"
rx="25"
fill="url(#bg)"
stroke="#2563EB"
stroke-width="2"/>

<!-- Title -->

<text
x="60"
y="70"
font-size="34"
font-family="Segoe UI"
font-weight="700"
fill="white">

⚡ Technical Skills

</text>

<!-- Java -->

<text x="60" y="130" fill="white" font-size="22">Java</text>

<rect
x="200"
y="112"
width="820"
height="20"
rx="10"
fill="#1F2937"/>

<rect
x="200"
y="112"
width="0"
height="20"
rx="10"
fill="url(#bar)"
filter="url(#glow)">

<animate
attributeName="width"
from="0"
to="780"
dur="2s"
fill="freeze"/>

</rect>

<text
x="1045"
y="128"
fill="#60A5FA"
font-size="18">

95%

</text>

